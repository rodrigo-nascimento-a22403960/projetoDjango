<!DOCTYPE html>
<html>
<head>
    <title>Cursos</title>
</head>
<body>
    <h1>Cursos</h1>

    {% for curso in cursos %}
        <div>
            <h2>{{ curso.nome }}</h2>

            {% if curso.imagem %}
                <img src="{{ curso.imagem.url }}" width="200">
            {% endif %}

            <p><strong>Professor:</strong> {{ curso.professor.nome }}</p>

            <h3>Alunos:</h3>
            <ul>
                {% for aluno in curso.alunos.all %}
                    <li>{{ aluno.nome }} — {{ aluno.numero }}</li>
                {% endfor %}
            </ul>
        </div>
        <hr>
    {% endfor %}

</body>
</html>
