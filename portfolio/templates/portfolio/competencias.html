{% extends "portfolio/base.html" %}
{% block content %}
<h2>Competências</h2>
<section>
    {% for comp in competencias %}
    <article>
        <header>
            <h3>{{ comp.nome }}</h3>
            <p>{{ comp.tipo }} — Nível {{ comp.nivel }}</p>
        </header>
        <section>
            <p>{{ comp.descricao }}</p>
        </section>
    </article>
    {% endfor %}
</section>
{% endblock %}
